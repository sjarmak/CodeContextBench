# V2 Minimal Experiment Config
#
# A minimal configuration for testing v2 runner with:
# - 1 benchmark (swebenchpro)
# - 1 model (opus)
# - 2 MCP modes (baseline + deepsearch_hybrid)
# - 1 task
#
# Usage:
#   bench-eval-v2 run -c configs_v2/examples/minimal.yaml
#   bench-eval-v2 dry-run -c configs_v2/examples/minimal.yaml

experiment_name: minimal_v2_test
description: "Minimal v2 test: single task, baseline vs MCP"
run_category: experiment

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5

mcp_modes:
  - baseline
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: eval_runs_v2
  export_on_complete: true

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - minimal
  - v2-test
