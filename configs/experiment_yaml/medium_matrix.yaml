# V2 Medium Matrix Experiment Config
#
# A medium-sized experiment matrix for ablation studies:
# - 1 benchmark (swebenchpro)
# - 2 models (opus + sonnet)
# - 2 MCP modes (baseline + deepsearch_hybrid)
# - 2 seeds for statistical significance
# - 10 tasks (random sample)
#
# Total runs: 1 × 2 × 2 × 2 × 10 = 80 runs
# Total pairs: 1 × 2 × 2 × 10 = 40 pairs
#
# Usage:
#   bench-eval-v2 run -c configs_v2/examples/medium_matrix.yaml
#   bench-eval-v2 dry-run -c configs_v2/examples/medium_matrix.yaml

experiment_name: medium_matrix_ablation
description: "Medium matrix: 2 models × baseline+MCP × 2 seeds × 10 tasks"
run_category: experiment

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: random_sample
      sample_size: 10
      seed: 42

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5
  - anthropic/claude-sonnet-4-20250514

mcp_modes:
  - baseline
  - deepsearch_hybrid

# MCP server configs (optional - uses defaults if not specified)
mcp_servers:
  deepsearch_hybrid:
    type: http
    url_template: "${SOURCEGRAPH_URL}/.api/mcp/deepsearch"
    headers:
      Authorization: "token ${SOURCEGRAPH_ACCESS_TOKEN}"

seeds: [0, 1]

execution:
  concurrency: 2
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: eval_runs_v2
  export_on_complete: true
  keep_harbor_artifacts: true

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - ablation
  - medium-matrix
  - multi-model
  - multi-seed
