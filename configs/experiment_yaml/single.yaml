# V2 Single MCP Variant Test
#
# A minimal configuration for testing MCP variant with sg-benchmarks:
# - 1 benchmark (swebenchpro)
# - 1 model (opus)
# - 1 MCP mode (deepsearch_hybrid only - no baseline)
# - 1 task (navidrome)
#
# Usage:
#   bench-eval-v2 run -c configs_v2/examples/single.yaml
#   bench-eval-v2 dry-run -c configs_v2/examples/single.yaml

experiment_name: single_mcp_test
description: "Single task MCP test: verify deepsearch_hybrid works with sg-benchmarks org"
run_category: experiment

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5

mcp_modes:
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: eval_runs_v2
  export_on_complete: true

pairing:
  enabled: false

tags:
  - single
  - mcp-only
  - sg-benchmarks-verify
