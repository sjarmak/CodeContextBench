# LoCoBench-Agent 1-Task Quick Verification Config
#
# NOTE: LoCoBench-Agent is a local benchmark not registered in Harbor's registry.
# The V2 config system doesn't support local paths, so use the shell script instead:
#
#   ./configs_v2/examples/locobench_1_task_verification.sh
#
# This YAML file is kept for reference and future registry integration.
#
# Uses a Python task (good toolchain support, fast Docker builds):
# - python_game_engine_expert_032_architectural_understanding_expert_01
# - Context: ~1M tokens, 85 files
# - Category: architectural_understanding
#
# Direct Harbor commands for manual testing:
#   # Baseline (no MCP)
#   BASELINE_MCP_TYPE=none harbor run \
#     -p /home/stephanie_jarmak/CodeContextBench/benchmarks/locobench_agent/tasks/python_game_engine_expert_032_architectural_understanding_expert_01 \
#     --agent-import-path agents.claude_baseline_agent:BaselineClaudeCodeAgent \
#     --model anthropic/claude-haiku-4-5-20251001 \
#     -n 1 --timeout-multiplier 5
#
#   # MCP Hybrid (Deep Search)
#   BASELINE_MCP_TYPE=deepsearch harbor run \
#     -p /home/stephanie_jarmak/CodeContextBench/benchmarks/locobench_agent/tasks/python_game_engine_expert_032_architectural_understanding_expert_01 \
#     --agent-import-path agents.claude_baseline_agent:BaselineClaudeCodeAgent \
#     --model anthropic/claude-haiku-4-5-20251001 \
#     -n 1 --timeout-multiplier 5

experiment_name: locobench_verification_test
description: "LoCoBench-Agent quick verification: Baseline + MCP variant smoke test"
run_category: troubleshooting

benchmarks:
  - name: locobench_agent
    version: "1.0"
    path: /home/stephanie_jarmak/CodeContextBench/benchmarks/locobench_agent/tasks
    task_selector:
      type: explicit
      task_ids:
        # Python architectural understanding task - good for quick verification
        # - Fast Docker build (Python-only)
        # - Clear evaluation criteria
        # - Representative of LoCoBench complexity
        - "python_game_engine_expert_032_architectural_understanding_expert_01"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-haiku-4-5-20251001  # Fast model for verification

mcp_modes:
  - baseline
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1  # Single task, single concurrency
  timeout_seconds: 1800  # 30 minutes for verification
  environment:
    type: docker
    delete_containers: false  # Keep for debugging if test fails

output:
  root_dir: eval_runs_v2
  export_on_complete: true
  export_formats:
    - json

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - locobench-agent
  - verification
  - smoke-test
  - quick-test
