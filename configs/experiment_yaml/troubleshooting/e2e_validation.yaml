# End-to-End Validation Config (SWE-bench Pro)
#
# Validates the full evaluation pipeline across 2 SWE-bench Pro tasks
# in both baseline and deepsearch_hybrid modes.
#
# Tasks selected to cover different failure modes:
# - flipt (Go): previously had permission errors
# - ansible (Python): different language, large repo
#
# Usage:
#   bench-eval-v2 run -c configs/troubleshooting/e2e_validation.yaml
#   bench-eval-v2 run -c configs/troubleshooting/e2e_validation.yaml --force-rebuild
#   bench-eval-v2 dry-run -c configs/troubleshooting/e2e_validation.yaml --json
#
# Note: Use --force-rebuild flag to ensure latest patches are applied.

experiment_name: e2e_validation
description: "End-to-end validation: 2 SWE-bench Pro tasks × baseline + deepsearch_hybrid"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_flipt-io__flipt-aebaecd026f752b187f11328b0d464761b15d2ab"
        - "instance_ansible__ansible-4c5ce5a1a9e79a845aff4978cfeb72a0d4ecf7d6"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5-20251101

mcp_modes:
  - baseline
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 7200
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: eval_runs_v2
  export_on_complete: true

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - e2e-validation
  - troubleshooting
