# MCP Validation Config
#
# Validates MCP tool usage by running the same 2 SWE-bench Pro tasks
# in both baseline (no MCP) and deepsearch_hybrid (MCP enabled) modes.
#
# Purpose:
# - Confirm deepsearch_hybrid mode triggers mcp__deepsearch__deepsearch calls
# - Compare trace tool usage between baseline and hybrid
# - Verify MCP does not introduce regressions
#
# Usage:
#   bench-eval-v2 run -c configs/troubleshooting/mcp_validation.yaml
#   bench-eval-v2 dry-run -c configs/troubleshooting/mcp_validation.yaml --json

experiment_name: mcp_validation
description: "MCP tool usage validation: baseline vs deepsearch_hybrid on 2 SWE-bench Pro tasks"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_flipt-io__flipt-aebaecd026f752b187f11328b0d464761b15d2ab"
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5-20251101

mcp_modes:
  - baseline
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: eval_runs_v2
  export_on_complete: true

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - mcp-validation
  - troubleshooting
