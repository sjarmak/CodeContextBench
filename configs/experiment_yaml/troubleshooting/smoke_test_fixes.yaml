# Smoke Test: Eval Framework Fixes
#
# Validates the three critical fixes from US-001 through US-004:
# 1. Harbor --user root permission fix
# 2. Agent-side permission setup (no sudo)
# 3. EVALUATION CONTEXT delivery via system prompt
# 4. Single-source test-first instructions
#
# 3 SWE-bench Pro tasks x 2 modes (baseline + hybrid) = 6 trials
#
# Task selection:
# - flipt-aebaecd: Known permission failure (Go) - validates root fix
# - navidrome-bf2bcb: Known baseline task (Go) - validates basic flow
# - ansible-4c5ce5a1: Python task - validates cross-language support
#
# Usage:
#   ./configs/troubleshooting/smoke_test_fixes.sh              # Run both modes
#   ./configs/troubleshooting/smoke_test_fixes.sh --baseline-only
#   ./configs/troubleshooting/smoke_test_fixes.sh --mcp-only

experiment_name: smoke_test_fixes
description: "Smoke test validating Harbor root fix, permission setup, and EVALUATION CONTEXT delivery"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_flipt-io__flipt-aebaecd026f752b187f11328b0d464761b15d2ab"
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"
        - "instance_ansible__ansible-4c5ce5a1a9e79a845aff4978cfeb72a0d4ecf7d6-v1055803c3a812189a1133297f7f5468579283f86"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5-20251101

mcp_modes:
  - baseline
  - sourcegraph_full

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 7200
  environment:
    type: docker
    delete_containers: false  # Keep containers for debugging

output:
  root_dir: eval_runs_v2
  export_on_complete: true
  export_formats:
    - json
    - markdown

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - smoke-test
  - fixes-validation
  - troubleshooting
  - permission-fix
  - system-prompt-fix
