# V2 Smoke Test Config
#
# Fast validation of v2 runner functionality:
# - Matrix expansion + deterministic IDs
# - MCP toggle correctness (on/off)
# - Canonical output presence
#
# This config is designed for dry-run validation, not actual execution.
# For quick execution tests, use minimal.yaml instead.
#
# Usage:
#   bench-eval-v2 dry-run -c configs_v2/smoke_test.yaml --json
#   bench-eval-v2 validate -c configs_v2/smoke_test.yaml

experiment_name: v2_smoke_test
description: "Smoke test for v2 runner validation"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"

models:
  - anthropic/claude-opus-4-5

mcp_modes:
  - baseline
  - deepsearch_hybrid

seeds: [0]

execution:
  concurrency: 1
  timeout_seconds: 600
  environment:
    type: docker
    delete_containers: true

output:
  root_dir: eval_runs_v2
  export_on_complete: true

pairing:
  enabled: true
  baseline_mode: baseline

tags:
  - smoke-test
  - validation
