# Claude Code Subscription Mode Test
#
# Tests Claude Code using subscription authentication instead of API key.
# This configuration:
# - Uses subscription auth (no ANTHROPIC_API_KEY required)
# - Runs 1 task as a proof of concept
# - Uses baseline mode (no MCP) for initial testing
# - Concurrency=1 to avoid subscription rate limits
#
# Prerequisites:
#   1. Run `claude auth login` to authenticate your subscription
#   2. Verify ~/.claude/auth.json exists
#   3. Set SOURCEGRAPH_ACCESS_TOKEN in ~/evals/.env.local (optional, for MCP tests)
#
# Usage:
#   ./run-eval run -c configs/subscription_test.yaml
#   ./run-eval dry-run -c configs/subscription_test.yaml

experiment_name: subscription_mode_test
description: "Test Claude Code subscription mode with single task"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"
  auth_mode: subscription  # Use subscription instead of API

models:
  - anthropic/claude-opus-4-5  # Use Opus (known to work)

mcp_modes:
  - baseline  # Start with baseline, then test MCP modes

seeds: [0]

execution:
  concurrency: 1  # Keep at 1 for subscription to avoid rate limits
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: runs
  export_on_complete: true

pairing:
  enabled: false  # No pairing needed for single mode test

tags:
  - subscription
  - test
  - prototype
