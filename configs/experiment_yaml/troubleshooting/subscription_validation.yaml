# Subscription Auth Validation Config
#
# Validates subscription authentication against a known-passing task.
# Compares subscription auth vs API auth behavior on a single SWE-bench Pro task.
#
# Purpose:
# - Confirm subscription credentials propagate into Docker container
# - Verify agent can execute with subscription auth (no ANTHROPIC_API_KEY)
# - Provide baseline for subscription vs API result comparison
#
# Prerequisites:
#   1. Run `claude auth login` to authenticate subscription
#   2. Verify ~/.claude/.credentials.json exists with claudeAiOauth.accessToken
#   3. Do NOT set ANTHROPIC_API_KEY (to ensure subscription path is exercised)
#
# Usage:
#   bench-eval-v2 run -c configs/troubleshooting/subscription_validation.yaml
#   bench-eval-v2 dry-run -c configs/troubleshooting/subscription_validation.yaml --json

experiment_name: subscription_validation
description: "Subscription auth validation: single task baseline to verify credential propagation"
run_category: troubleshooting

benchmarks:
  - name: swebenchpro
    version: "1.0"
    task_selector:
      type: explicit
      task_ids:
        - "instance_navidrome__navidrome-bf2bcb12799b21069f137749e0c331f761d1f693"

agent:
  import_path: agents.claude_baseline_agent:BaselineClaudeCodeAgent
  version: "1.0.0"
  auth_mode: subscription
  # auth_json_path: /custom/path/to/.credentials.json  # Uncomment to override default ~/.claude/.credentials.json

models:
  - anthropic/claude-opus-4-5-20251101

mcp_modes:
  - baseline  # Subscription only, no MCP complexity

seeds: [0]

execution:
  concurrency: 1  # Keep at 1 to avoid subscription rate limits
  timeout_seconds: 3600
  environment:
    type: docker
    delete_containers: false

output:
  root_dir: runs
  export_on_complete: true

pairing:
  enabled: false  # Single mode, no pairing needed

tags:
  - subscription
  - validation
  - troubleshooting
