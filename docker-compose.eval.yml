# docker-compose.eval.yml — Local eval kit for CodeScaleBench
#
# Usage:
#   AGENT_COMMAND='your-agent --flag' docker compose -f docker-compose.eval.yml up
#
# Results are written to ./csb-results/ on the host.

services:
  csb-eval:
    build:
      context: .
      dockerfile: Dockerfile.eval
    environment:
      - AGENT_COMMAND=${AGENT_COMMAND:-echo "no agent command configured"}
    volumes:
      - ./csb-results:/app/results
    command: ["--suite", "quick", "--agent-command", "${AGENT_COMMAND:-echo no-op}"]
