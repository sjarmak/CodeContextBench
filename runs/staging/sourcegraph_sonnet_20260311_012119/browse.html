// ============ Helpers ============
function scoreClass(s) {
    if (s === null || s === undefined) return 'score-zero';
    if (s >= 0.8) return 'score-high';
    if (s >= 0.4) return 'score-mid';
    if (s > 0) return 'score-low';
    return 'score-zero';
}

function fmt(v, digits=2) {
    if (v === null || v === undefined) return '—';
    return typeof v === 'number' ? v.toFixed(digits) : v;
}

function fmtSec(s) {
    if (!s) return '—';
    if (s < 60) return s.toFixed(1) + 's';
    if (s < 3600) return (s / 60).toFixed(1) + 'm';
    return (s / 3600).toFixed(1) + 'h';
}

function fmtTokens(n) {
    if (!n) return '—';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return n.toString();
}

function toolColor(name) {
    if (name.startsWith('mcp__')) return 'tool-mcp';
    const base = ['Bash','Read','Write','Edit','Grep','Glob','ToolSearch','Agent'];
    for (const b of base) if (name === b) return 'tool-' + b;
    return 'tool-other';
}

function renderSummary() {
    const el = document.getElementById('summary-cards');
    const byConfig = {};
    TASKS.forEach(t => {

        byConfig[t.config].push(t);
    });

    let html = '';
    for (const [cfg, tasks] of Object.entries(byConfig)) {
        const scores = tasks.map(t => t.reward).filter(s => s !== null && s !== undefined);
        const mean = scores.length ? (scores.reduce((a,b) => a+b, 0) / scores.length) : null;
        const cls = mean === null ? '' : mean >= 0.7 ? 'good' : mean >= 0.4 ? 'warn' : 'bad';
        html += `<div class="card">
            <div class="card-label">${cfg}</div>
            <div class="card-value ${cls}">${mean !== null ? mean.toFixed(3) : '—'}</div>
            <div class="card-label">${scores.length} scored / ${tasks.length} total</div>
        </div>`;
    }

    // Overall
    const allScores = TASKS.map(t => t.reward).filter(s => s !== null && s !== undefined);
    const totalCost = TASKS.reduce((a, t) => a + (t.cost_usd || 0), 0);
    const totalTokens = TASKS.reduce((a, t) => a + (t.output_tokens || 0), 0);
    html += `<div class="card">
        <div class="card-label">Total Cost</div>
        <div class="card-value">${totalCost > 0 ? '$' + totalCost.toFixed(2) : '—'}</div>

    html += `<div class="card">
        <div class="card-label">Output Tokens</div>
        <div class="card-value">${fmtTokens(totalTokens)}</div>
    </div>`;

    el.innerHTML = html;
}

    let html = '<table><thead><tr><th>Task</th>';
    CONFIGS.forEach(c => { html += `<th class="num">${c}<br>Score</th><th class="num">Time</th><th class="num">Tools</th>`; });
    if (CONFIGS.length === 2) html += '<th class="num">Delta</th>';
    html += '</tr></thead><tbody>';

    TASK_NAMES.forEach(tn => {
        const row = byTask[tn] || {};
        html += `<tr class="clickable" onclick="showDetail('${tn}')">`;
        html += `<td><strong>${tn}</strong></td>`;

        let scores = [];
        CONFIGS.forEach(c => {
            const t = row[c];
            if (t) {
                const sc = t.reward;
                scores.push(sc);
                html += `<td class="num score ${scoreClass(sc)}">${fmt(sc, 3)}</td>`;
                html += `<td class="num">${fmtSec(t.wall_clock_sec)}</td>`;
                html += `<td class="num">${t.tool_calls_total || '—'}</td>`;
            } else {
                scores.push(null);
                html += '<td>—</td><td>—</td><td>—</td>';
            }
        });

        if (CONFIGS.length === 2 && scores[0] !== null && scores[1] !== null) {
            const delta = scores[1] - scores[0];
            const cls = delta > 0.01 ? 'delta-pos' : delta < -0.01 ? 'delta-neg' : '';
            html += `<td class="num ${cls}">${delta >= 0 ? '+' : ''}${delta.toFixed(3)}</td>`;
        } else if (CONFIGS.length === 2) {
            html += '<td>—</td>';
        }

        html += '</tr>';
    });

    // Mean row
    html += '<tr style="border-top:2px solid #30363d;font-weight:600"><td>Mean</td>';
    CONFIGS.forEach(c => {
        const scores = TASKS.filter(t => t.config === c && t.reward !== null).map(t => t.reward);
        const mean = scores.length ? scores.reduce((a,b) => a+b,0) / scores.length : null;
        const times = TASKS.filter(t => t.config === c && t.wall_clock_sec).map(t => t.wall_clock_sec);
        const meanTime = times.length ? times.reduce((a,b) => a+b,0) / times.length : null;
        const tools = TASKS.filter(t => t.config === c && t.tool_calls_total).map(t => t.tool_calls_total);
        const meanTools = tools.length ? Math.round(tools.reduce((a,b) => a+b,0) / tools.length) : null;
        html += `<td class="num score ${scoreClass(mean)}">${fmt(mean, 3)}</td>`;
        html += `<td class="num">${fmtSec(meanTime)}</td>`;
        html += `<td class="num">${meanTools || '—'}</td>`;
    });
    if (CONFIGS.length === 2) {
        const m0 = TASKS.filter(t => t.config === CONFIGS[0] && t.reward !== null).map(t => t.reward);
        const m1 = TASKS.filter(t => t.config === CONFIGS[1] && t.reward !== null).map(t => t.reward);
        const mean0 = m0.length ? m0.reduce((a,b) => a+b,0)/m0.length : null;
        const mean1 = m1.length ? m1.reduce((a,b) => a+b,0)/m1.length : null;
        if (mean0 !== null && mean1 !== null) {
            const d = mean1 - mean0;
            html += `<td class="num ${d > 0 ? 'delta-pos' : 'delta-neg'}">${d >= 0 ? '+' : ''}${d.toFixed(3)}</td>`;
        } else html += '<td>—</td>';
    }
    html += '</tr>';

    html += '</tbody></table>';
    el.innerHTML = html;
}

            <td class="num">${t.tool_calls_total || '—'}</td>

            <td class="num">${fmtTokens(t.output_tokens)}</td>
            <td class="num">${t.cost_usd ? '$' + t.cost_usd.toFixed(2) : '—'}</td>
            <td>${t.timed_out ? '<span class="badge badge-error">timeout</span>' : ''}${t.tool_errors_total ? '<span class="badge badge-error">' + t.tool_errors_total + ' errors</span>' : ''}</td>
        </tr>
    `).join('');
}

let sortCol = -1, sortAsc = true;
function sortAll(col) {
    if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
    // Re-sort TASKS in place (affects filterAll)
    const keys = ['task_name', 'config', 'reward', 'wall_clock_sec', 'tool_calls_total', 'mcp_ratio', 'output_tokens', 'cost_usd'];
    TASKS.sort((a, b) => {
        let va = a[keys[col]], vb = b[keys[col]];
        if (va === null || va === undefined) va = -Infinity;
        if (vb === null || vb === undefined) vb = -Infinity;
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
    });
    filterAll();
}

function renderTiming() {
    const el = document.getElementById('tab-timing');
    let html = '<table><thead><tr><th>Task</th><th>Config</th><th class="num">Total</th><th class="num">Env Setup</th><th class="num">Agent</th><th class="num">Verifier</th><th class="num">Turns</th><th class="num">Ctx Peak</th><th class="num">Cache Hit</th></tr></thead><tbody>';

    TASKS.forEach(t => {
        html += `<tr class="clickable" onclick="showTaskDetail('${t.task_name}', '${t.config}')">
            <td><strong>${t.task_name}</strong></td>
            <td><span class="badge ${t.config.includes('mcp') ? 'badge-mcp' : 'badge-baseline'}">${t.config}</span></td>
            <td class="num">${fmtSec(t.total_sec || ((t.env_setup_sec||0) + (t.wall_clock_sec||0) + (t.verifier_sec||0)))}</td>
            <td class="num">${fmtSec(t.env_setup_sec)}</td>
            <td class="num">${fmtSec(t.wall_clock_sec)}</td>
            <td class="num">${fmtSec(t.verifier_sec)}</td>
            <td class="num">${t.conversation_turns || '—'}</td>
            <td class="num">${t.context_window_peak_pct ? (t.context_window_peak_pct * 100).toFixed(0) + '%' : '—'}</td>
            <td class="num">${t.cache_hit_rate ? (t.cache_hit_rate * 100).toFixed(0) + '%' : '—'}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
}

// ============ Detail Panel ============
function renderVariantPane(t) {
    let html = '';
    html += '<div class="detail-grid">';
    html += '<div class="detail-metric"><div class="label">Wall Clock</div><div class="value">' + fmtSec(t.wall_clock_sec) + '</div></div>';
    html += '<div class="detail-metric"><div class="label">Tool Calls</div><div class="value">' + (t.tool_calls_total||0) + ' (' + (t.tool_calls_mcp||0) + ' MCP)</div></div>';
    html += '<div class="detail-metric"><div class="label">Output Tokens</div><div class="value">' + fmtTokens(t.output_tokens) + '</div></div>';
    html += '<div class="detail-metric"><div class="label">Input Tokens</div><div class="value">' + fmtTokens(t.input_tokens) + '</div></div>';
    html += '<div class="detail-metric"><div class="label">Cost</div><div class="value">' + (t.cost_usd ? '$' + t.cost_usd.toFixed(2) : '—') + '</div></div>';
    html += '<div class="detail-metric"><div class="label">Files Modified</div><div class="value">' + (t.files_modified||0) + ' (+' + (t.lines_added||0) + '/-' + (t.lines_removed||0) + ')</div></div>';
    html += '<div class="detail-metric"><div class="label">Context Peak</div><div class="value">' + (t.context_window_peak_pct ? (t.context_window_peak_pct*100).toFixed(0)+'%' : '—') + '</div></div>';
    html += '<div class="detail-metric"><div class="label">MCP Latency p50/p95</div><div class="value">' + (t.mcp_latency_p50_ms ? t.mcp_latency_p50_ms.toFixed(0)+'ms' : '—') + ' / ' + (t.mcp_latency_p95_ms ? (t.mcp_latency_p95_ms/1000).toFixed(1)+'s' : '—') + '</div></div>';
    html += '</div>';

    // Tool call breakdown
    if (t.tool_calls_by_name && Object.keys(t.tool_calls_by_name).length) {
        html += '<div class="detail-section"><h3>Tool Call Breakdown</h3><pre>';
        var sorted = Object.entries(t.tool_calls_by_name).sort(function(a,b) { return b[1] - a[1]; });
        sorted.forEach(function(pair) {
            var name = pair[0], count = pair[1];
            var shortName = name.replace('mcp__sourcegraph__', 'sg:');
            var bar = '';
            for (var bi = 0; bi < Math.min(count, 50); bi++) bar += '█';
            html += shortName.padEnd(30) + ' ' + String(count).padStart(4) + ' ' + bar + '\n';
        });
        html += '</pre></div>';
    }

    // Search queries
    if (t.search_queries && t.search_queries.length) {
        html += '<div class="detail-section"><h3>Search Queries</h3>';
        t.search_queries.forEach(function(q, i) {
            var toolShort = (q.tool || '').replace('mcp__sourcegraph__', '');
            html += '<div class="search-query"><span class="tool">#' + (q.step_id || i+1) + ' ' + toolShort + '</span>: <span class="query">' + escapeHtml(q.query || '') + '</span></div>';
        });
        html += '</div>';
    }

    // Instruction preview
    if (t.instruction_preview) {
        html += '<div class="detail-section"><h3>Instruction (first 2000 chars)</h3><pre>' + escapeHtml(t.instruction_preview) + '</pre></div>';
    }

    // Transcript excerpt
    if (t.transcript_excerpt) {
        html += '<div class="detail-section"><h3>Transcript Excerpt</h3><pre>' + escapeHtml(t.transcript_excerpt) + '</pre></div>';
    }

    // File paths
    html += '<div class="detail-section"><h3>Files</h3><pre>';
    html += 'Trial dir:     ' + t.trial_dir + '\n';
    if (t.trajectory_path) html += 'Trajectory:    ' + t.trajectory_path + '\n';
    if (t.transcript_path) html += 'Transcript:    ' + t.transcript_path + '\n';
    html += '</pre></div>';

    // Error info
    if (t.exception_info) {
        html += '<div class="detail-section"><h3>Exception</h3><pre style="color:#f85149">' + escapeHtml(JSON.stringify(t.exception_info, null, 2)) + '</pre></div>';
    }

    return html;
}

function showDetail(taskName, activeConfig) {
    var panel = document.getElementById('detail-panel');
    var variants = TASKS.filter(function(t) { return t.task_name === taskName; });
    if (!variants.length) return;

    // If no activeConfig specified, default to first
    if (!activeConfig) activeConfig = variants[0].config;

    var html = '<h2>' + escapeHtml(taskName) + ' <span style="color:#8b949e;font-size:0.85rem">(' + variants.length + ' config' + (variants.length > 1 ? 's' : '') + ')</span></h2>';

    // Config tabs
    if (variants.length > 1) {
        html += '<div class="detail-config-tabs">';
        variants.forEach(function(t, i) {
            var isMcp = t.config.indexOf('mcp') >= 0;
            var tabClass = isMcp ? 'tab-mcp' : 'tab-baseline';
            var active = t.config === activeConfig ? ' active' : '';
            html += '<div class="detail-config-tab ' + tabClass + active + '" onclick="switchDetailTab(\x27' + escapeHtml(taskName) + '\x27, \x27' + escapeHtml(t.config) + '\x27)">';
            html += t.config + ' &mdash; <span class="score ' + scoreClass(t.reward) + '">' + fmt(t.reward, 3) + '</span>';
            html += '</div>';
        });
        html += '</div>';
    }

    // Config panes
    variants.forEach(function(t, i) {
        var active = t.config === activeConfig ? ' active' : '';
        html += '<div class="detail-config-pane' + active + '" id="detail-pane-' + i + '">';
        html += renderVariantPane(t);
        html += '</div>';
    });

    panel.className = 'detail-panel visible';
    panel.innerHTML = html;
    panel.scrollIntoView({ behavior: 'smooth' });
}

function switchDetailTab(taskName, config) {
    showDetail(taskName, config);
}

function showTaskDetail(taskName, config) {
    showDetail(taskName, config);
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/`/g, '&#96;').replace(/\$/g, '&#36;');
}

// ============ Tab Switching ============
function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).style.display = 'block';
    event.target.classList.add('active');
    document.getElementById('detail-panel').className = 'detail-panel';
}

// ============ Init ============
renderSummary();
renderComparison();
renderAll();
renderTools();
renderSearch();
renderTiming();
</script>
