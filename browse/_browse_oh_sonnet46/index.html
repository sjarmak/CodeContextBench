    const configFilter = document.getElementById('configFilter');
    const statusFilter = document.getElementById('statusFilter');
    const taskSearch = document.getElementById('taskSearch');
    const clearBtn = document.getElementById('clearBtn');
    const rowsEl = document.getElementById('rows');
    const statsEl = document.getElementById('stats');

    function fmt(v,d) { return (v===null||v===undefined) ? '-' : Number(v).toFixed(d||3); }
    function fmtSec(s) { if (!s) return '-'; if (s<60) return s.toFixed(1)+'s'; if (s<3600) return (s/60).toFixed(1)+'m'; return (s/3600).toFixed(1)+'h'; }
    function fmtTok(n) { if (!n) return '-'; if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(0)+'K'; return n; }

    // Populate config dropdown
    var configs = [...new Set(TASKS.map(t => t.config))].sort();
    configs.forEach(c => configFilter.add(new Option(c, c)));

    function render() {
      var cf = configFilter.value, sf = statusFilter.value, q = taskSearch.value.trim().toLowerCase();
      var filtered = TASKS.filter(t =>
        (!cf || t.config === cf) &&
        (!sf || t.status === sf) &&
        (!q || t.task_name.toLowerCase().includes(q))
      );
      rowsEl.innerHTML = filtered.map(t => '<tr>' +
        '<td class="mono">' + t.config + '</td>' +
        '<td><a href="' + t.slug + '.html">' + t.task_name + '</a></td>' +
        '<td><span class="pill ' + t.status + '">' + t.status + '</span></td>' +
        '<td class="num">' + fmt(t.reward) + '</td>' +
        '<td class="num">' + fmt(t.mcp_ratio) + '</td>' +
        '<td class="num">' + (t.tool_calls_total || '-') + '</td>' +
        '<td class="num">' + fmtSec(t.wall_clock_sec) + '</td>' +
        '<td class="num">' + (t.cost_usd ? '$'+t.cost_usd.toFixed(2) : '-') + '</td>' +
      '</tr>').join('');
      statsEl.textContent = 'Showing ' + filtered.length + ' of ' + TASKS.length + ' trials';
    }

    configFilter.addEventListener('change', render);
    statusFilter.addEventListener('change', render);
    taskSearch.addEventListener('input', render);
    clearBtn.addEventListener('click', function() { configFilter.value=''; statusFilter.value=''; taskSearch.value=''; render(); });
